# Build and test the RubyTree library.
#
# This runs as a Github Action.

name: Build and Test
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: "3.1"
            experimental: false
          - ruby: "3.2"
            experimental: false
          - ruby: "3.3"
            experimental: false
          - ruby: "3.4"
            experimental: false
          - ruby: ruby-head
            experimental: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: rm -rf pkg
      - run: bundle exec rake clobber
      - run: bundle exec rake test:all
      - run: bundle exec rake doc:yard
        if: matrix.ruby == '3.4'
      - run: bundle exec rake gemspec
      - run: bundle exec rake gem:package

  quality:
    name: Quality Checks (Ruby 3.4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Install Semgrep
        run: python -m pip install semgrep
      - run: bundle exec rake lint
      - run: bundle exec rake doc:check
      - run: bundle exec rake security
